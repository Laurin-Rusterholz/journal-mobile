<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Journal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700;800&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet">

<style>
  *,*::before,*::after { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    margin:0; padding:0; height:100%;
    overscroll-behavior:none;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
    background:#0a0a0b; color:#fafafa;
    -webkit-font-smoothing:antialiased;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
    min-height:100vh; min-height:100dvh;
    display:flex; flex-direction:column;
    letter-spacing:-0.011em;
  }
  body::before {
    content:""; position:fixed; inset:0; pointer-events:none; z-index:-1;
    background:
      radial-gradient(circle at 15% 5%, rgba(168,85,247,0.10) 0%, transparent 40%),
      radial-gradient(circle at 85% 95%, rgba(124,58,237,0.07) 0%, transparent 40%);
  }
  
  /* ── Header ── */
  .app-header {
    flex-shrink:0;
    padding: 18px 22px 14px;
    background: rgba(10,10,11,0.85);
    backdrop-filter: saturate(180%) blur(24px);
    -webkit-backdrop-filter: saturate(180%) blur(24px);
    display:flex; align-items:center; gap:12px;
    border-bottom:0.5px solid rgba(255,255,255,0.06);
  }
  .app-title {
    display:flex; align-items:center; gap:10px;
    font-size:20px; font-weight:800;
    letter-spacing:-0.025em;
  }
  .app-title-emoji {
    width:36px; height:36px; border-radius:11px;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    display:flex; align-items:center; justify-content:center;
    font-size:18px;
    box-shadow: 0 6px 16px rgba(168,85,247,0.4);
  }
  .sync-chip {
    margin-left:auto;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    color:#a1a1aa;
    padding: 5px 11px;
    border-radius:999px;
    font-size:11px; font-weight:600;
    display:inline-flex; align-items:center; gap:5px;
    cursor:pointer;
  }
  .sync-dot {
    width:6px; height:6px; border-radius:50%;
    background:#71717a;
  }
  .sync-chip.ok .sync-dot { background:#22c55e; box-shadow:0 0 6px rgba(34,197,94,0.5); }
  .sync-chip.err .sync-dot { background:#ef4444; }
  .sync-chip.syncing .sync-dot {
    background:#a855f7;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity:0.5; }
    50% { opacity:1; }
  }
  
  /* ── Main scroll ── */
  .main {
    flex:1; overflow-y:auto;
    padding: 6px 16px 100px;
    -webkit-overflow-scrolling: touch;
  }
  .pull-hint {
    text-align:center; padding:8px 0;
    font-size:11px; color:#52525b;
    transition: opacity 0.2s;
    opacity: 0;
  }
  .pull-hint.show { opacity:1; }
  
  /* ── Stat strip ── */
  .stat-strip {
    display:flex; gap:8px; padding: 10px 0 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .stat-strip::-webkit-scrollbar { display:none; }
  .stat-card {
    flex-shrink:0;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 10px 14px;
    display:flex; flex-direction:column; gap:2px;
    min-width: 90px;
  }
  .stat-card .v {
    font-size: 20px; font-weight: 800;
    letter-spacing:-0.025em;
    color: #d8b4fe;
  }
  .stat-card .l {
    font-size: 10px; font-weight: 600;
    color: #71717a;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  
  /* ── Filter chips ── */
  .filter-row {
    display:flex; gap:6px; padding-bottom:14px;
    overflow-x:auto;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display:none; }
  .chip {
    flex-shrink:0;
    padding: 6px 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    color: #a1a1aa;
    border-radius: 999px;
    font-size: 11.5px; font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .chip.active {
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 2px 8px rgba(168,85,247,0.4);
  }
  
  /* ── Entry card ── */
  .entry {
    background: rgba(168,85,247,0.04);
    border: 1px solid rgba(168,85,247,0.16);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .entry:active {
    transform: scale(0.985);
    background: rgba(168,85,247,0.09);
  }
  .entry.unread::before {
    content: "";
    position: absolute;
    top: 14px; left: -3px;
    width: 4px; height: calc(100% - 28px);
    background: linear-gradient(180deg, #a855f7, #7c3aed);
    border-radius: 0 4px 4px 0;
  }
  .entry-head {
    display:flex; align-items:center; gap:8px;
    margin-bottom: 6px;
  }
  .entry-title {
    font-size:14.5px; font-weight:700;
    color:#fafafa;
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: -0.011em;
  }
  .entry-date {
    font-size: 10.5px; color: #71717a;
    flex-shrink: 0;
    font-weight: 600;
  }
  .entry-preview {
    font-size: 13px;
    color: #a1a1aa;
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .entry-meta {
    display:flex; gap:8px; align-items:center;
    margin-top: 8px;
    font-size: 10.5px;
    color: #52525b;
  }
  .entry-meta .dot { color:#3f3f46; }
  
  /* ── Empty state ── */
  .empty {
    text-align:center;
    padding: 80px 20px 40px;
    color: #52525b;
  }
  .empty-icon {
    font-size: 56px;
    margin-bottom: 14px;
    filter: drop-shadow(0 4px 12px rgba(168,85,247,0.3));
  }
  .empty-title {
    font-size: 17px; font-weight: 700;
    color: #a1a1aa;
    margin-bottom: 6px;
  }
  .empty-sub {
    font-size: 13px;
    line-height: 1.55;
  }
  
  /* ── Reader (full-screen book) ── */
  .reader {
    position: fixed; inset:0;
    z-index: 100;
    background: #0a0a0b;
    display: none;
    flex-direction: column;
    padding-top: env(safe-area-inset-top);
  }
  .reader.show { display:flex; animation: rdrFadeIn 0.25s ease; }
  @keyframes rdrFadeIn {
    from { opacity:0; transform: translateY(20px); }
    to { opacity:1; transform: translateY(0); }
  }
  
  /* Reader-Themes via CSS variables */
  .reader.theme-dark { --rd-bg:#0a0a0b; --rd-fg:#e4e4e7; --rd-meta:#71717a; }
  .reader.theme-sepia { --rd-bg:#f4ecd8; --rd-fg:#2d2418; --rd-meta:#6b5d3f; }
  .reader.theme-graphite { --rd-bg:#1a1a1d; --rd-fg:#d4d4d8; --rd-meta:#71717a; }
  
  .reader { background: var(--rd-bg, #0a0a0b); color: var(--rd-fg, #e4e4e7); }
  
  .reader-toolbar {
    flex-shrink:0;
    padding: 12px 18px;
    display:flex; align-items:center; gap:8px;
    border-bottom: 1px solid rgba(127,127,127,0.1);
    background: var(--rd-bg);
  }
  .rt-btn {
    background: rgba(127,127,127,0.08);
    border: 1px solid rgba(127,127,127,0.14);
    color: var(--rd-fg);
    border-radius: 8px;
    padding: 7px 11px;
    font-size: 12.5px; font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .rt-btn.active {
    background: rgba(168,85,247,0.2);
    border-color: rgba(168,85,247,0.35);
    color: #c084fc;
  }
  .rt-grp {
    display:flex; gap:1px;
    background: rgba(127,127,127,0.08);
    border-radius: 8px;
    padding: 2px;
  }
  .rt-grp .rt-btn {
    background: transparent; border:0; padding: 5px 9px;
  }
  .rt-grp .rt-btn.active {
    background: rgba(168,85,247,0.25);
  }
  .rt-meta {
    margin-left:auto;
    font-size: 11px;
    color: var(--rd-meta);
  }
  
  .reader-body {
    flex: 1;
    overflow-y: auto;
    padding: 30px 22px 100px;
    -webkit-overflow-scrolling: touch;
  }
  .reader-content {
    max-width: 720px;
    margin: 0 auto;
    font-family: var(--rd-font, 'Lora', Georgia, serif);
    font-size: var(--rd-size, 18px);
    line-height: var(--rd-lh, 1.75);
  }
  .reader-content h1 {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: calc(var(--rd-size, 18px) * 1.7);
    font-weight: 800;
    line-height: 1.2;
    margin: 0 0 8px;
    letter-spacing: -0.025em;
  }
  .reader-content .meta {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--rd-meta);
    margin-bottom: 32px;
    display:flex; gap:14px; flex-wrap: wrap;
  }
  .reader-content p {
    margin: 0 0 1.1em;
  }
  .reader-content h2, .reader-content h3 {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    margin: 1.6em 0 0.5em;
    letter-spacing: -0.015em;
  }
  .reader-content h2 { font-size: calc(var(--rd-size) * 1.3); }
  .reader-content h3 { font-size: calc(var(--rd-size) * 1.1); }
  .reader-content blockquote {
    border-left: 3px solid #a855f7;
    padding-left: 16px;
    margin: 1.4em 0;
    font-style: italic;
    color: var(--rd-meta);
  }
  .reader-content em { font-style: italic; }
  .reader-content strong { font-weight: 700; }
  .reader-content a { color: #a855f7; }
  
  .reader-progress {
    position: fixed; bottom:0; left:0;
    height:3px;
    background: linear-gradient(90deg, #a855f7, #c084fc);
    width:0%;
    z-index: 110;
    transition: width 0.1s linear;
    pointer-events: none;
  }
  
  /* ── Toast ── */
  .toast {
    position: fixed; left:50%; top:24px;
    transform: translateX(-50%) translateY(-100px);
    background: rgba(20,20,24,0.96);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fafafa;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px; font-weight: 600;
    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    z-index: 1000;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok { border-color: rgba(34,197,94,0.3); }
  .toast.err { border-color: rgba(239,68,68,0.3); }
</style>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

<body>

<div class="app-header">
  <div class="app-title">
    <div class="app-title-emoji">📖</div>
    <span>Journal</span>
  </div>
  <button class="sync-chip" id="syncChip" onclick="manualSync()">
    <span class="sync-dot"></span>
    <span id="syncText">…</span>
  </button>
</div>

<div class="main" id="main">
  <div class="pull-hint" id="pullHint">↓ Release to sync</div>
  <div id="content"></div>
</div>

<!-- Reader (full-screen) -->
<div class="reader theme-dark" id="reader">
  <div class="reader-toolbar">
    <button class="rt-btn" onclick="closeReader()">← Back</button>
    <div class="rt-grp">
      <button class="rt-btn" id="sizeS" onclick="setReaderSize(15)">A−</button>
      <button class="rt-btn active" id="sizeM" onclick="setReaderSize(18)">A</button>
      <button class="rt-btn" id="sizeL" onclick="setReaderSize(22)">A+</button>
    </div>
    <div class="rt-grp">
      <button class="rt-btn active" id="thDark" onclick="setReaderTheme('dark')">🌑</button>
      <button class="rt-btn" id="thGraphite" onclick="setReaderTheme('graphite')">⚫</button>
      <button class="rt-btn" id="thSepia" onclick="setReaderTheme('sepia')">📜</button>
    </div>
    <div class="rt-meta" id="readerMeta"></div>
  </div>
  <div class="reader-body" id="readerBody">
    <div class="reader-content" id="readerContent"></div>
  </div>
  <div class="reader-progress" id="readerProgress"></div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════
// CONFIG (uses same Netlify Blob as Quantus)
// ════════════════════════════════════════════════════════════
const HARDCODED_BASE_URL = 'https://management-xo2-pro.netlify.app';
const BLOB_KEY = 'app-data.json';
const SEEN_KEY = 'journal-mobile-last-seen';
const NOTIFIED_KEY = 'journal-mobile-last-notified';
const READ_PREFS_KEY = 'journal-mobile-reader-prefs';
const READ_PROGRESS_KEY = 'journal-mobile-progress';

let _data = null;
let _etag = null;
let _filter = 'all';
let _currentEntryId = null;
let _syncTimer = null;
let _lastSyncOk = false;

// ════════════════════════════════════════════════════════════
// SYNC
// ════════════════════════════════════════════════════════════
async function syncFromServer(silent) {
  setSyncStatus('syncing', '…');
  try {
    const url = HARDCODED_BASE_URL + '/.netlify/functions/blob-get?key=' 
      + encodeURIComponent(BLOB_KEY) + '&_ts=' + Date.now();
    // Kein If-None-Match Header — Backend muss diesen erst in CORS erlauben.
    // Stattdessen: ETag-Check clientseitig nach dem Fetch (wir schauen ob ETag identisch zum letzten ist).
    const r = await fetch(url, { cache: 'no-store' });
    
    if (!r.ok) throw new Error('HTTP ' + r.status);
    
    const newEtag = r.headers.get('ETag') || '';
    if (newEtag && newEtag === _etag) {
      // Server-State unverändert → kein Re-Render nötig (spart CPU)
      _lastSyncOk = true;
      setSyncStatus('ok', formatTime(new Date()));
      checkForNewEntries();
      return;
    }
    
    const text = await r.text();
    if (text) {
      try { _data = JSON.parse(text); } catch(e) { 
        try {
          const wrapped = JSON.parse(text);
          if (wrapped && wrapped.data) _data = typeof wrapped.data === 'string' ? JSON.parse(wrapped.data) : wrapped.data;
        } catch {}
      }
    }
    _etag = newEtag;
    _lastSyncOk = true;
    setSyncStatus('ok', formatTime(new Date()));
    
    render();
    checkForNewEntries();
  } catch(e) {
    console.warn('Sync error:', e);
    _lastSyncOk = false;
    setSyncStatus('err', 'Offline');
    if (!silent) toast('Sync failed', 'err');
  }
}

window.manualSync = function() {
  if (navigator.vibrate) navigator.vibrate(10);
  syncFromServer(false);
};

function setSyncStatus(state, text) {
  const chip = document.getElementById('syncChip');
  const txt = document.getElementById('syncText');
  if (!chip) return;
  chip.classList.remove('ok', 'err', 'syncing');
  if (state) chip.classList.add(state);
  if (txt) txt.textContent = text;
}

function formatTime(d) {
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
}

// ════════════════════════════════════════════════════════════
// DATA HELPERS
// ════════════════════════════════════════════════════════════
function getEntries() {
  const arr = Array.isArray(_data?.mobilePushes) ? _data.mobilePushes : [];
  return arr.slice().sort((a, b) => (b.sentAt || '').localeCompare(a.sentAt || ''));
}

function escHTML(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function htmlToPlainText(html) {
  if (!html) return '';
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  tmp.querySelectorAll('p, h1, h2, h3, h4, li, blockquote, br').forEach(el => {
    el.insertAdjacentText('afterend', '\n\n');
  });
  return (tmp.textContent || '').replace(/\n{3,}/g, '\n\n').trim();
}

function readingTime(text) {
  const words = (text || '').split(/\s+/).filter(Boolean).length;
  return Math.max(1, Math.ceil(words / 220));
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const sec = (now - d) / 1000;
  if (sec < 60) return 'just now';
  if (sec < 3600) return Math.floor(sec/60) + ' min ago';
  if (sec < 86400) return Math.floor(sec/3600) + 'h ago';
  if (sec < 86400 * 7) return Math.floor(sec/86400) + 'd ago';
  return d.toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: 'numeric' });
}

function formatFullDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('en-US', {
    weekday: 'long',
    day: '2-digit', month: 'long', year: 'numeric',
    hour: '2-digit', minute: '2-digit', hour12: false
  });
}

// ════════════════════════════════════════════════════════════
// RENDER LIST
// ════════════════════════════════════════════════════════════
function getLastSeen() { return localStorage.getItem(SEEN_KEY) || ''; }
function setLastSeen(ts) { try { localStorage.setItem(SEEN_KEY, ts); } catch(e) {} }

function render() {
  const c = document.getElementById('content');
  const all = getEntries();
  const lastSeen = getLastSeen();
  
  if (all.length === 0) {
    c.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📖</div>
        <div class="empty-title">No entries yet</div>
        <div class="empty-sub">Send entries from your Journal Booklet on Quantus.<br>Pull down to refresh.</div>
      </div>
    `;
    return;
  }
  
  // Stats
  const newCount = all.filter(e => (e.sentAt || '') > lastSeen).length;
  const totalWords = all.reduce((s, e) => s + (htmlToPlainText(e.content || '').split(/\s+/).filter(Boolean).length), 0);
  const totalMin = Math.round(totalWords / 220);
  
  // Filter
  let entries = all;
  if (_filter === 'unread') entries = entries.filter(e => (e.sentAt || '') > lastSeen);
  else if (_filter === 'today') {
    const today = new Date().toISOString().slice(0, 10);
    entries = entries.filter(e => (e.sentAt || '').slice(0, 10) === today);
  } else if (_filter === 'week') {
    const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString();
    entries = entries.filter(e => (e.sentAt || '') >= weekAgo);
  }
  
  let html = `
    <div class="stat-strip">
      <div class="stat-card">
        <div class="v">${all.length}</div>
        <div class="l">Entries</div>
      </div>
      ${newCount > 0 ? `<div class="stat-card"><div class="v" style="color:#fcd34d">${newCount}</div><div class="l">Unread</div></div>` : ''}
      <div class="stat-card">
        <div class="v">${totalMin}m</div>
        <div class="l">To read</div>
      </div>
      <div class="stat-card">
        <div class="v">${totalWords > 1000 ? (totalWords/1000).toFixed(1) + 'k' : totalWords}</div>
        <div class="l">Words</div>
      </div>
    </div>
    
    <div class="filter-row">
      <button class="chip ${_filter==='all'?'active':''}" onclick="setFilter('all')">All ${all.length}</button>
      ${newCount > 0 ? `<button class="chip ${_filter==='unread'?'active':''}" onclick="setFilter('unread')">Unread ${newCount}</button>` : ''}
      <button class="chip ${_filter==='today'?'active':''}" onclick="setFilter('today')">Today</button>
      <button class="chip ${_filter==='week'?'active':''}" onclick="setFilter('week')">Last 7 days</button>
    </div>
  `;
  
  if (entries.length === 0) {
    html += `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">No entries match</div><div class="empty-sub">Try a different filter.</div></div>`;
  } else {
    html += entries.map(e => {
      const isUnread = (e.sentAt || '') > lastSeen;
      const plain = htmlToPlainText(e.content || '');
      const min = readingTime(plain);
      return `<div class="entry ${isUnread ? 'unread' : ''}" onclick="openReader('${e.id}')">
        <div class="entry-head">
          <div class="entry-title">${escHTML(e.title || 'Journal entry')}</div>
          <div class="entry-date">${escHTML(formatDate(e.sentAt))}</div>
        </div>
        <div class="entry-preview">${escHTML(plain.slice(0, 240))}${plain.length > 240 ? '…' : ''}</div>
        <div class="entry-meta">
          <span>⏱ ${min} min read</span>
          <span class="dot">·</span>
          <span>${plain.split(/\s+/).filter(Boolean).length} words</span>
          ${isUnread ? '<span class="dot">·</span><span style="color:#c084fc;font-weight:700">NEW</span>' : ''}
        </div>
      </div>`;
    }).join('');
  }
  
  c.innerHTML = html;
}

window.setFilter = function(f) {
  _filter = f;
  if (navigator.vibrate) navigator.vibrate(8);
  render();
};

// ════════════════════════════════════════════════════════════
// READER (full-screen)
// ════════════════════════════════════════════════════════════
window.openReader = function(id) {
  const entry = getEntries().find(e => e.id === id);
  if (!entry) return;
  _currentEntryId = id;
  
  // Mark as seen — update last seen if this entry is newer than current lastSeen
  const ls = getLastSeen();
  if ((entry.sentAt || '') > ls) {
    // Set lastSeen to NEWEST entry overall (so badge becomes correct)
    const newest = getEntries()[0];
    if (newest) setLastSeen(newest.sentAt || '');
  }
  
  if (navigator.vibrate) navigator.vibrate(10);
  
  applyReaderPrefs();
  
  // Build content
  const plain = htmlToPlainText(entry.content || '');
  const min = readingTime(plain);
  const wordCount = plain.split(/\s+/).filter(Boolean).length;
  
  document.getElementById('readerContent').innerHTML = `
    <h1>${escHTML(entry.title || 'Journal entry')}</h1>
    <div class="meta">
      <span>📅 ${escHTML(formatFullDate(entry.sentAt))}</span>
      <span>⏱ ${min} min</span>
      <span>📝 ${wordCount} words</span>
    </div>
    ${entry.content || '<p style="color:#71717a;font-style:italic">Empty entry</p>'}
  `;
  
  document.getElementById('readerMeta').textContent = min + ' min · 0%';
  document.getElementById('readerProgress').style.width = '0%';
  
  document.getElementById('reader').classList.add('show');
  
  // Restore scroll position
  const body = document.getElementById('readerBody');
  body.scrollTop = 0;
  setTimeout(() => {
    const progress = getStoredProgress(id);
    if (progress > 0 && progress < 95) {
      const total = body.scrollHeight - body.clientHeight;
      body.scrollTop = (total * progress) / 100;
    }
  }, 100);
  
  body.removeEventListener('scroll', onReaderScroll);
  body.addEventListener('scroll', onReaderScroll, { passive: true });
};

window.closeReader = function() {
  document.getElementById('reader').classList.remove('show');
  _currentEntryId = null;
  render();
};

function onReaderScroll() {
  const body = document.getElementById('readerBody');
  if (!body) return;
  const total = body.scrollHeight - body.clientHeight;
  const pct = total > 0 ? Math.min(100, Math.max(0, (body.scrollTop / total) * 100)) : 0;
  
  const bar = document.getElementById('readerProgress');
  if (bar) bar.style.width = pct + '%';
  
  const meta = document.getElementById('readerMeta');
  if (meta && _currentEntryId) {
    const entry = getEntries().find(e => e.id === _currentEntryId);
    if (entry) {
      const min = readingTime(htmlToPlainText(entry.content || ''));
      meta.textContent = min + ' min · ' + Math.round(pct) + '%';
    }
  }
  
  // Save progress (debounced)
  clearTimeout(onReaderScroll._t);
  onReaderScroll._t = setTimeout(() => {
    if (_currentEntryId) saveProgress(_currentEntryId, pct);
  }, 600);
}

function getStoredProgress(id) {
  try {
    const all = JSON.parse(localStorage.getItem(READ_PROGRESS_KEY) || '{}');
    return all[id] || 0;
  } catch { return 0; }
}
function saveProgress(id, pct) {
  try {
    const all = JSON.parse(localStorage.getItem(READ_PROGRESS_KEY) || '{}');
    all[id] = pct;
    localStorage.setItem(READ_PROGRESS_KEY, JSON.stringify(all));
  } catch(e) {}
}

// ── Reader prefs ──
function getReaderPrefs() {
  try { return JSON.parse(localStorage.getItem(READ_PREFS_KEY) || '{}'); } catch { return {}; }
}
function saveReaderPrefs(p) {
  try { localStorage.setItem(READ_PREFS_KEY, JSON.stringify(p)); } catch(e) {}
}

function applyReaderPrefs() {
  const p = getReaderPrefs();
  const reader = document.getElementById('reader');
  reader.classList.remove('theme-dark', 'theme-sepia', 'theme-graphite');
  reader.classList.add('theme-' + (p.theme || 'dark'));
  reader.style.setProperty('--rd-size', (p.size || 18) + 'px');
  
  // Update toolbar buttons
  ['thDark', 'thGraphite', 'thSepia'].forEach(id => {
    document.getElementById(id)?.classList.remove('active');
  });
  document.getElementById('th' + (p.theme === 'sepia' ? 'Sepia' : p.theme === 'graphite' ? 'Graphite' : 'Dark'))?.classList.add('active');
  
  ['sizeS','sizeM','sizeL'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  const size = p.size || 18;
  document.getElementById(size <= 16 ? 'sizeS' : size >= 21 ? 'sizeL' : 'sizeM')?.classList.add('active');
}

window.setReaderTheme = function(theme) {
  const p = getReaderPrefs();
  p.theme = theme;
  saveReaderPrefs(p);
  applyReaderPrefs();
  if (navigator.vibrate) navigator.vibrate(8);
};
window.setReaderSize = function(size) {
  const p = getReaderPrefs();
  p.size = size;
  saveReaderPrefs(p);
  applyReaderPrefs();
  if (navigator.vibrate) navigator.vibrate(8);
};

// ════════════════════════════════════════════════════════════
// NOTIFICATIONS
// ════════════════════════════════════════════════════════════
async function ensureNotificationPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  try {
    const r = await Notification.requestPermission();
    return r === 'granted';
  } catch { return false; }
}

function checkForNewEntries() {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;
  
  const lastNotified = localStorage.getItem(NOTIFIED_KEY) || '';
  const entries = getEntries();
  const newOnes = entries.filter(e => (e.sentAt || '') > lastNotified);
  
  if (newOnes.length > 0) {
    const latest = newOnes[0];
    try {
      const n = new Notification('📖 New journal entry', {
        body: latest.title || 'You have a new journal entry from Quantus.',
        tag: 'journal-' + latest.id,
        requireInteraction: false,
      });
      n.onclick = () => {
        window.focus();
        openReader(latest.id);
        n.close();
      };
    } catch(e) { console.warn('Notification failed:', e); }
    
    try { localStorage.setItem(NOTIFIED_KEY, latest.sentAt || new Date().toISOString()); } catch(e) {}
  }
}

// ════════════════════════════════════════════════════════════
// PULL-TO-REFRESH
// ════════════════════════════════════════════════════════════
let _ptr = { startY: 0, pulling: false };
const main = document.getElementById('main');
main.addEventListener('touchstart', e => {
  if (main.scrollTop === 0) { _ptr.startY = e.touches[0].clientY; _ptr.pulling = false; }
  else _ptr.startY = -1;
}, { passive: true });
main.addEventListener('touchmove', e => {
  if (_ptr.startY < 0) return;
  const diff = e.touches[0].clientY - _ptr.startY;
  if (diff > 60 && !_ptr.pulling) {
    _ptr.pulling = true;
    document.getElementById('pullHint').classList.add('show');
    if (navigator.vibrate) navigator.vibrate(8);
  }
}, { passive: true });
main.addEventListener('touchend', () => {
  if (_ptr.pulling) {
    document.getElementById('pullHint').classList.remove('show');
    syncFromServer(true);
  }
  _ptr.pulling = false;
  _ptr.startY = 0;
});

// ════════════════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════════════════
let _toastTimer = null;
function toast(msg, kind) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (kind || '');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
window.addEventListener('load', async () => {
  setSyncStatus('syncing', 'Loading');
  
  // Initial sync
  await syncFromServer(true);
  
  // Ask for notification permission after first interaction
  setTimeout(() => ensureNotificationPermission(), 2000);
  
  // Auto-sync every 60s
  _syncTimer = setInterval(() => syncFromServer(true), 60000);
});

// Refresh on visibility change
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) syncFromServer(true);
});

// Handle reader back via Esc
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const r = document.getElementById('reader');
    if (r?.classList.contains('show')) { closeReader(); }
  }
});
</script>
